# Run `pre-commit install` once to enable all of these (the default hook types
# below wire up commit-msg and pre-push automatically).
default_install_hook_types: [pre-commit, commit-msg, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.16.4
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: local
    hooks:
      # Source and config stay ASCII; on-watch translations live in i18n files
      # (added with the app) that are excluded here because they are legitimately
      # non-ASCII.
      - id: no-non-ascii
        name: no non-ASCII characters
        language: pygrep
        entry: '[^\x00-\x7f]'
        files: '\.(js|ya?ml|md|json)$'
        exclude: '(package-lock\.json$|CHANGELOG\.md$|/i18n/)'

      # Prettier owns formatting for JS, JSON, YAML and Markdown. It runs locally
      # (fast) on every commit; CI runs the same check as a required gate.
      - id: prettier
        name: prettier (check)
        entry: npx prettier --check
        language: system
        files: '\.(js|json|md|ya?ml)$'
        exclude: 'package-lock\.json$'

      - id: eslint
        name: eslint
        entry: npx eslint
        language: system
        files: '\.js$'

      # The unit tests are quick but not needed on every commit, so they run at
      # pre-push. CI runs them too as a required check.
      - id: vitest
        name: unit tests (vitest)
        entry: npm test
        language: system
        pass_filenames: false
        files: '\.js$'
        stages: [pre-push]
